<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLogue - 생명의 나무 (V13)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body, html { margin:0; padding:0; width:100%; height:100%; background-color:#020617; color:#ffffff; font-family:'Pretendard', sans-serif; overflow:hidden; }
        #tree-canvas { width: 100vw; height: 100vh; }
        
        /* 선(Link) 스타일 */
        .link { fill: none; stroke: #475569; stroke-width: 2.5px; stroke-opacity: 0.4; }
        
        /* ★ 글씨 스타일 (절대 화이트 + 외곽선) */
        .node-label { 
            font-size: 15px; 
            font-weight: 900; 
            fill: #ffffff !important; 
            paint-order: stroke;
            stroke: #000000;
            stroke-width: 4px;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }
        .key-label { 
            font-size: 12px; 
            fill: #94a3b8 !important; 
            font-weight: 800; 
            font-style: italic;
            paint-order: stroke;
            stroke: #000000;
            stroke-width: 3px;
        }
        
        .node-hitbox { fill: transparent; cursor: pointer; }
        .node:hover circle { stroke: #3b82f6; stroke-width: 3px; filter: drop-shadow(0 0 8px #3b82f6); }
        .popup-active { transform: translateY(0) !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 right-0 p-5 bg-slate-950/80 backdrop-blur-md z-[100] border-b border-white/10 flex justify-between items-center">
        <h1 class="text-xl font-black flex items-center gap-2"><span class="text-blue-500 text-2xl">🧬</span> BioLogue Tree</h1>
        <div class="text-[10px] text-slate-500 font-bold tracking-widest uppercase">copyright 2026 Yoon Ji Young</div>
    </header>

    <button id="global-back-btn" onclick="renderTree('full')" class="hidden fixed top-24 left-8 z-[150] bg-blue-600 hover:bg-blue-500 text-white font-black py-3 px-6 rounded-2xl shadow-2xl transition-all border-2 border-white/20">
        ← 전체 계통수로 돌아가기
    </button>

    <div id="tree-canvas"></div>

    <div id="info-popup" class="fixed bottom-0 left-0 right-0 z-[200] bg-slate-900/95 border-t border-white/10 p-6 transform translate-y-full opacity-0 transition-all duration-500 backdrop-blur-2xl">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row gap-6 items-center">
            <div class="w-full md:w-52 h-32 bg-slate-800 rounded-2xl overflow-hidden border border-white/10 shadow-lg">
                <img id="p-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="flex-grow">
                <div class="flex justify-between items-center mb-2">
                    <h2 id="p-title" class="text-2xl font-black text-white"></h2>
                    <button onclick="closePopup()" class="text-slate-500 hover:text-white">✕ 닫기</button>
                </div>
                <p id="p-desc" class="text-slate-300 text-sm mb-4"></p>
                <div id="p-tags" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="p-btn-area" class="hidden">
                <button id="p-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-8 rounded-2xl shadow-xl transition-all">
                    세부 분류 탐험하기 🔍
                </button>
            </div>
        </div>
    </div>

    <script>
        const treeData = {
            full: {
                name: "LIFE", color: "#64748b",
                children: [
                    { 
                        name: "진정세균역", emoji: "🦠", color: "#3b82f6", 
                        desc: "세포벽에 펩티도글리칸이 있는 원핵생물입니다. 대장균, 남세균 등이 속합니다.",
                        img: "https://via.placeholder.com/400x300/3b82f6/ffffff?text=Bacteria",
                        features: ["펩티도글리칸", "단세포"],
                        children: [{ name: "진정세균계" }] 
                    },
                    { 
                        name: "Archaea/Eukarya", color: "#475569", 
                        children: [
                            { 
                                name: "고세균역", emoji: "🌋", color: "#a855f7",
                                desc: "극한 환경에 살며 히스톤 단백질을 가져 진핵생물과 유전 체계가 유사합니다.",
                                img: "https://via.placeholder.com/400x300/a855f7/ffffff?text=Archaea",
                                features: ["히스톤", "극한 환경"],
                                children: [{ name: "고세균계" }] 
                            },
                            { 
                                name: "진핵생물역", emoji: "🌿", color: "#10b981", 
                                desc: "핵막과 소기관을 가진 복잡한 세포 생물군입니다.",
                                img: "https://via.placeholder.com/400x300/10b981/ffffff?text=Eukarya",
                                features: ["핵막", "80S 리보솜"],
                                children: [
                                    { name: "원생생물계", emoji: "🧪", color: "#10b981", desc: "단세포 진핵생물 위주의 무리입니다.", features: ["아메바"], img: "https://via.placeholder.com/400x300/10b981/ffffff?text=Protista" },
                                    { name: "식물계", id: "plantae", emoji: "🌳", color: "#22c55e", desc: "광합성을 하는 다세포 독립영양 생물입니다.", features: ["셀룰로스"], img: "https://via.placeholder.com/400x300/22c55e/ffffff?text=Plantae" },
                                    { name: "균계", emoji: "🍄", color: "#10b981", desc: "분해 흡수 영양을 하는 종속영양 생물입니다.", features: ["키틴"], img: "https://via.placeholder.com/400x300/10b981/ffffff?text=Fungi" },
                                    { name: "동물계", id: "animalia", emoji: "🦁", color: "#f59e0b", desc: "운동성이 있는 다세포 종속영양 생물입니다.", features: ["세포벽 없음"], img: "https://via.placeholder.com/400x300/f59e0b/ffffff?text=Animalia" }
                                ]
                            }
                        ]
                    }
                ]
            },
            plantae: {
                name: "식물계", color: "#22c55e",
                children: [
                    { name: "선태식물", key: "관다발 없음", emoji: "🌱", desc: "관다발이 없어 물가에 사는 이끼류입니다.", features: ["이끼"], img: "https://via.placeholder.com/400x300/22c55e/ffffff?text=Moss" },
                    { name: "관다발 있음", children: [
                        { name: "양치식물", key: "종자 없음", emoji: "🌿", desc: "포자로 번식하는 관다발 식물입니다.", features: ["고사리"], img: "https://via.placeholder.com/400x300/22c55e/ffffff?text=Fern" },
                        { name: "종자 있음", children: [
                            { name: "나자식물", key: "씨방 없음", emoji: "🌲", desc: "밑씨가 노출된 겉씨식물입니다.", img: "https://via.placeholder.com/400x300/22c55e/ffffff?text=Pine" },
                            { name: "속씨식물", key: "씨방 있음", emoji: "🌸", color: "#f472b6", desc: "씨방이 발달한 고등 식물입니다.", img: "https://via.placeholder.com/400x300/f472b6/ffffff?text=Flower" }
                        ]}
                    ]}
                ]
            },
            animalia: {
                name: "동물계", color: "#f59e0b",
                children: [
                    { name: "해면동물", key: "배엽X", emoji: "🧽", desc: "가장 원시적인 동물군입니다.", img: "https://via.placeholder.com/400x300/f59e0b/ffffff?text=Sponge" },
                    { name: "배엽 형성", children: [
                        { name: "자포동물", key: "2배엽/방사대칭", emoji: "🪼", desc: "촉수를 가진 동물입니다.", img: "https://via.placeholder.com/400x300/f59e0b/ffffff?text=Jellyfish" },
                        { name: "3배엽/좌우대칭", children: [
                            { name: "선구동물", children: [{name:"연체/절지동물", key:"담륜자/탈피", emoji:"🦞", desc: "다양한 무척추동물"}]},
                            { name: "후구동물", children: [{name:"극피동물", emoji:"⭐"}, {name:"척삭동물", emoji:"🐟", desc: "사람을 포함한 고등 동물"}]}
                        ]}
                    ]}
                ]
            }
        };

        let svg, g, zoomObj;

        window.onload = function() {
            svg = d3.select("#tree-canvas").append("svg").attr("width", "100%").attr("height", "100%");
            g = svg.append("g");
            zoomObj = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (e) => g.attr("transform", e.transform));
            svg.call(zoomObj);
            renderTree('full');
        };

        window.renderTree = function(level) {
            g.selectAll("*").remove();
            const data = treeData[level];
            
            // 뒤로가기 버튼 제어 (전체 화면이 아니면 보이기)
            document.getElementById('global-back-btn').style.display = (level === 'full') ? 'none' : 'block';

            const root = d3.hierarchy(data);
            const treeLayout = d3.tree().size([window.innerHeight - 300, window.innerWidth - 500]);
            treeLayout(root);

            // 가지(Link)
            g.selectAll(".link").data(root.links()).enter().append("path").attr("class", "link")
                .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

            const node = g.selectAll(".node").data(root.descendants()).enter().append("g")
                .attr("transform", d => `translate(${d.y},${d.x})`);

            // ★ 클릭 판정용 대형 히트박스
            node.append("circle").attr("r", 40).attr("class", "node-hitbox").on("click", (e, d) => showPopup(d.data));

            node.append("circle").attr("r", 8).style("fill", d => d.data.color || "#475569").style("stroke", "#fff");

            // ★ 글자 위치 조정 (dy를 조절하여 가지 위에 적히지 않도록 노드 살짝 옆/위로 배치)
            node.append("text")
                .attr("class", "node-label")
                .attr("dy", d => d.children ? "-1.2em" : "0.35em") // 부모 노드는 위로, 자식 노드는 옆으로
                .attr("x", d => d.children ? 0 : 20)
                .style("text-anchor", d => d.children ? "middle" : "start")
                .text(d => (d.data.emoji || "") + " " + d.data.name);

            // 분류 키 (가지 중간 텍스트)
            node.filter(d => d.data.key).append("text").attr("class", "key-label")
                .attr("dy", "2.8em").attr("x", 0).style("text-anchor", "middle").text(d => d.data.key);

            // 초기 카메라 위치 고정
            svg.transition().duration(700).call(zoomObj.transform, d3.zoomIdentity.translate(150, 100).scale(0.85));
        };

        function showPopup(data) {
            if(!data.desc && !data.id) return;
            const popup = document.getElementById('info-popup');
            document.getElementById('p-title').innerText = (data.emoji || "") + " " + data.name;
            document.getElementById('p-desc').innerText = data.desc || "상세 정보를 확인해보세요.";
            document.getElementById('p-img').src = data.img || "https://via.placeholder.com/400x300/1e293b/ffffff?text=BioLogue";
            
            document.getElementById('p-tags').innerHTML = (data.features || []).map(f => `<span class="bg-blue-500/30 px-3 py-1 rounded-full text-blue-100 border border-blue-400/30">#${f}</span>`).join('');

            const btnArea = document.getElementById('p-btn-area');
            const btn = document.getElementById('p-btn');
            btnArea.classList.toggle('hidden', !data.id);
            btn.onclick = () => { closePopup(); renderTree(data.id); };

            popup.classList.add('popup-active');
        }

        window.closePopup = () => document.getElementById('info-popup').classList.remove('popup-active');
        
        // 휠 줌아웃 (위로 굴리면 뒤로가기)
        window.addEventListener('wheel', e => { if(e.deltaY < -60) { renderTree('full'); closePopup(); } });
    </script>
</body>
</html>
