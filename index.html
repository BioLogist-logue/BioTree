<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioLogue - 생명의 나무 (V15)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body, html { margin:0; padding:0; width:100%; height:100%; background-color:#020617; color:#ffffff; font-family:'Pretendard', sans-serif; overflow:hidden; touch-action: none; }
        #tree-canvas { width: 100vw; height: 100vh; }
        
        /* 가지(Link) 스타일 */
        .link { fill: none; stroke: #475569; stroke-width: 2.5px; stroke-opacity: 0.4; transition: all 0.5s ease; }
        
        /* 노드 레이블 (외곽선으로 가독성 확보) */
        .node-label { 
            font-size: 14px; 
            font-weight: 900; 
            fill: #ffffff !important; 
            paint-order: stroke;
            stroke: #000000;
            stroke-width: 4px;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }
        @media (max-width: 768px) { .node-label { font-size: 11px; } }

        /* 분류 키 (가지 위 텍스트) */
        .key-label { 
            font-size: 10px; 
            fill: #94a3b8 !important; 
            font-weight: 800; 
            font-style: italic;
            paint-order: stroke;
            stroke: #000000;
            stroke-width: 3px;
        }
        
        .node-hitbox { fill: transparent; cursor: pointer; }
        .node:hover circle { stroke: #3b82f6; stroke-width: 3px; filter: drop-shadow(0 0 8px #3b82f6); }
        .popup-active { transform: translateY(0) !important; opacity: 1 !important; }

        /* 모바일 최적화 스크롤바 숨기기 */
        #info-popup { max-height: 60vh; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
        #info-popup::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 right-0 p-4 bg-slate-950/80 backdrop-blur-md z-[100] border-b border-white/10 flex justify-between items-center">
        <h1 class="text-lg font-black flex items-center gap-2"><span class="text-blue-500 text-xl">🧬</span> BioLogue</h1>
        <div class="text-[9px] text-slate-500 font-bold tracking-widest uppercase text-right leading-tight">
            Phylogenetic Tree<br>by Yoon Ji Young
        </div>
    </header>

    <button id="global-back-btn" onclick="renderTree('full')" class="hidden fixed top-20 left-4 z-[150] bg-blue-600 hover:bg-blue-500 text-white font-black py-2 px-5 rounded-xl shadow-2xl transition-all border border-white/20 text-sm">
        ← 전체 계통수
    </button>

    <div id="tree-canvas"></div>

    <div id="info-popup" class="fixed bottom-0 left-0 right-0 z-[200] bg-slate-900/95 border-t border-white/10 p-5 transform translate-y-full opacity-0 transition-all duration-500 backdrop-blur-2xl rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-start mb-4">
                <div class="flex gap-4 items-center">
                    <div class="w-24 h-20 md:w-40 md:h-28 bg-slate-800 rounded-xl overflow-hidden border border-white/10 shadow-lg shrink-0">
                        <img id="p-img" src="" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h2 id="p-title" class="text-xl md:text-2xl font-black text-white"></h2>
                        <div id="p-tags" class="flex flex-wrap gap-1 mt-1"></div>
                    </div>
                </div>
                <button onclick="closePopup()" class="text-slate-500 hover:text-white p-2 text-xl">✕</button>
            </div>
            <p id="p-desc" class="text-slate-300 text-sm mb-5 leading-relaxed"></p>
            <div id="p-btn-area" class="hidden">
                <button id="p-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all text-sm">
                    상세 분류 탐험하기 🔍
                </button>
            </div>
        </div>
    </div>

    <script>
        const treeData = {
            full: {
                name: "LIFE", color: "#64748b",
                children: [
                    { 
                        name: "진정세균역", emoji: "🦠", color: "#3b82f6", 
                        desc: "세포벽에 펩티도글리칸이 있는 원핵생물군입니다. 대장균, 남세균 등이 속합니다.",
                        img: "https://postfiles.pstatic.net/MjAyNjA0MjRfMTY4/MDAxNzc3MDA4ODA3MzA3.QAjSXTwmo7qJPlW1DHtrsQfL_-_nwFnrrk8Vwa_ZLxgg.xFkbUpHvGwwXsGCkAuAAbsRJlr-A7NMDNw5TARkgTh4g.PNG/image.png",
                        features: ["펩티도글리칸", "단세포"],
                        children: [{ name: "진정세균계" }] 
                    },
                    { 
                        name: "Archaea/Eukarya", color: "#475569", 
                        children: [
                            { 
                                name: "고세균역", emoji: "🌋", color: "#a855f7",
                                desc: "극한 환경에 주로 서식하며, 유전자 전사 및 번역 기작이 진핵생물과 유사합니다.",
                                img: "https://postfiles.pstatic.net/MjAyNjA0MjRfMTUg/MDAxNzc3MDA4ODI3NDQ5.iyuDn7TUvj3Nz0yLY2yYcsMFgz1aWvt9V6LlouddUGIg.4O1MjZgl64Lu1ppGKmFy2fZBUEJm5G5cPXJ52rJyY3Qg.PNG/image.png",
                                features: ["히스톤", "펩티도글리칸X"],
                                children: [{ name: "고세균계" }] 
                            },
                            { 
                                name: "진핵생물역", emoji: "🌿", color: "#10b981", 
                                desc: "핵막과 막성 세포 소기관을 가진 복잡한 구조의 세포 생물군입니다.",
                                img: "https://via.placeholder.com/400x300/10b981/ffffff?text=Eukarya",
                                features: ["핵막O", "80S 리보솜"],
                                children: [
                                    { name: "원생생물계", emoji: "🧪", color: "#10b981", desc: "단세포 진핵생물 위주의 무리로 아메바, 짚신벌레 등이 속합니다.", features: ["단세포 중심"], img: "https://postfiles.pstatic.net/MjAyNjA0MjRfMjEz/MDAxNzc3MDA4ODQ4MDQw.g-ndgKEMpH0aitdNFP6DUxZgBSmRbYnMC2oipJ1FYyYg.0u6p60eWqgaf3xMnLoU0JKCUtATL9gx0ke7JpuQhPwwg.PNG/image.png" },
                                    { name: "식물계", id: "plantae", emoji: "🌳", color: "#22c55e", desc: "광합성을 하는 다세포 독립영양 생물군입니다.", features: ["셀룰로스"], img: "https://postfiles.pstatic.net/MjAyNjA0MjRfMjQz/MDAxNzc3MDA4ODc0MjA3.lYJkLEB1lBxzvGes63H9hZQ0zHEMoKb7Ra76J5oX-pQg.RF5IIpqX21Xv_zeomYhHMWXt89he4UfLLiTIJWECENIg.PNG/image.png" },
                                    { name: "균계", emoji: "🍄", color: "#10b981", desc: "유기물을 분해 흡수하는 종속영양 생물군입니다.", features: ["키틴"], img: "https://postfiles.pstatic.net/MjAyNjA0MjRfODMg/MDAxNzc3MDA4ODYxNzgz.db6sya9doUeOxWDHxzT1W1wkubflqDO07aqwbc51qG0g.gYEMW57xL4Pc7CcO8HetWqFbolECuCE6TC0NXmO7gqkg.PNG/image.png" },
                                    { name: "동물계", id: "animalia", emoji: "🦁", color: "#f59e0b", desc: "운동 능력이 있는 다세포 종속영양 생물군입니다.", features: ["세포벽X"], img: "https://postfiles.pstatic.net/MjAyNjA0MjRfMjcw/MDAxNzc3MDA4ODgyMDkx.7hTCFKJ_X412s7AbQPrOyA73ozxZHiHiXye0zZdtAPIg.-EWx3DybB1I07uVrQHyhj6rvO11_CLxAR2D_aBLe0e8g.PNG/image.png" }
                                ]
                            }
                        ]
                    }
                ]
            },
            plantae: {
                name: "식물계", color: "#22c55e",
                children: [
                    { name: "선태식물", key: "관다발X", emoji: "🌱", desc: "관다발이 없어 물가에 서식하는 이끼류입니다.", features: ["이끼"], img: "https://via.placeholder.com/400x300/22c55e/ffffff?text=Moss" },
                    { name: "관다발 식물", children: [
                        { name: "양치식물", key: "종자X", emoji: "🌿", desc: "포자로 번식하는 고사리 등의 식물입니다.", features: ["고사리"], img: "https://via.placeholder.com/400x300/22c55e/ffffff?text=Fern" },
                        { name: "종자 식물", children: [
                            { name: "나자식물", key: "씨방X", emoji: "🌲", desc: "밑씨가 노출된 소나무 등의 겉씨식물입니다.", img: "https://via.placeholder.com/400x300/22c55e/ffffff?text=Pine" },
                            { name: "속씨식물", key: "씨방O", emoji: "🌸", color: "#f472b6", desc: "씨방이 발달한 고등 꽃 식물입니다.", img: "https://via.placeholder.com/400x300/f472b6/ffffff?text=Flower" }
                        ]}
                    ]}
                ]
            },
            animalia: {
                name: "동물계", color: "#f59e0b",
                children: [
                    { name: "해면동물", key: "배엽X", emoji: "🧽", desc: "가장 원시적인 동물로 조직 분화가 뚜렷하지 않습니다.", img: "https://via.placeholder.com/400x300/f59e0b/ffffff?text=Sponge" },
                    { name: "진생동물", children: [
                        { name: "자포동물", key: "2배엽", emoji: "🪼", desc: "방사 대칭을 이루며 촉수를 가집니다.", img: "https://via.placeholder.com/400x300/f59e0b/ffffff?text=Jellyfish" },
                        { name: "3배엽 형성", children: [
                            { name: "선구동물", children: [{name:"연체/절지", key:"담륜자/탈피", emoji:"🦞", desc: "무척추동물 중심의 거대 분류군"}]},
                            { name: "후구동물", children: [{name:"극피동물", emoji:"⭐"}, {name:"척삭동물", emoji:"🐟", desc: "사람을 포함한 척추동물 분류군"}]}
                        ]}
                    ]}
                ]
            }
        };

        let svg, g, zoomObj, currentLevel = 'full';

        window.onload = function() {
            svg = d3.select("#tree-canvas").append("svg").attr("width", "100%").attr("height", "100%");
            g = svg.append("g");
            zoomObj = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (e) => g.attr("transform", e.transform));
            svg.call(zoomObj);
            renderTree('full');
            window.addEventListener('resize', () => renderTree(currentLevel));
        };

        window.renderTree = function(level) {
            currentLevel = level;
            g.selectAll("*").remove();
            const data = treeData[level];
            const isMobile = window.innerWidth < 768;
            
            document.getElementById('global-back-btn').style.display = (level === 'full') ? 'none' : 'block';

            const root = d3.hierarchy(data);
            const treeLayout = d3.tree();
            
            if(isMobile) {
                // 모바일: 세로 배치 및 자식 간 가로 간격(nodeSize[0]) 강제 확보
                treeLayout.nodeSize([95, 140]); 
            } else {
                // PC: 전체 화면 크기에 맞춰 가로 배치
                treeLayout.size([window.innerHeight - 250, window.innerWidth - 450]);
            }
            treeLayout(root);

            const linkGen = isMobile ? d3.linkVertical().x(d => d.x).y(d => d.y) : d3.linkHorizontal().x(d => d.y).y(d => d.x);

            g.selectAll(".link").data(root.links()).enter().append("path")
                .attr("class", "link")
                .attr("d", linkGen);

            const node = g.selectAll(".node").data(root.descendants()).enter().append("g")
                .attr("transform", d => isMobile ? `translate(${d.x},${d.y})` : `translate(${d.y},${d.x})`);

            // 클릭 히트박스 (터치 편의)
            node.append("circle").attr("r", 35).attr("class", "node-hitbox").on("click", (e, d) => showPopup(d.data));
            node.append("circle").attr("r", isMobile ? 6 : 8).style("fill", d => d.data.color || "#475569").style("stroke", "#fff");

            // ★ 지그재그(Staggered) 레이블 배치 로직 ★
            node.append("text")
                .attr("class", "node-label")
                .attr("dy", (d) => {
                    if(!isMobile) return d.children ? "-1.2em" : "0.35em";
                    
                    if(d.children) return "-1.8em"; // 부모는 위로
                    // 자식들은 형제 순서에 따라 dy를 교차 배치
                    const siblingIdx = d.parent ? d.parent.children.indexOf(d) : 0;
                    return (siblingIdx % 2 === 0) ? "2.2em" : "4.0em"; 
                })
                .attr("x", d => isMobile ? 0 : (d.children ? 0 : 15))
                .style("text-anchor", "middle")
                .style("font-size", d => {
                    if(isMobile && d.data.name.length >= 5) return "10px";
                    return isMobile ? "11px" : "14px";
                })
                .text(d => (d.data.emoji || "") + " " + d.data.name);

            // 분류 키 지그재그 높이 대응
            node.filter(d => d.data.key).append("text")
                .attr("class", "key-label")
                .attr("dy", (d) => {
                    if(!isMobile) return "2.8em";
                    const siblingIdx = d.parent ? d.parent.children.indexOf(d) : 0;
                    return (siblingIdx % 2 !== 0) ? "5.2em" : "3.4em";
                })
                .attr("x", 0).style("text-anchor", "middle").text(d => d.data.key);

            // 자동 줌 조절: 나무를 화면 중앙에 안착
            const bounds = g.node().getBBox();
            const parent = svg.node().getBoundingClientRect();
            const scale = 0.8 / Math.max(bounds.width / parent.width, bounds.height / parent.height);
            const midX = bounds.x + bounds.width / 2, midY = bounds.y + bounds.height / 2;
            
            svg.transition().duration(700).call(
                zoomObj.transform, 
                d3.zoomIdentity.translate(parent.width/2 - scale*midX, parent.height/2 - scale*midY).scale(scale)
            );
        };

        function showPopup(data) {
            if(!data.desc && !data.id) return;
            const popup = document.getElementById('info-popup');
            document.getElementById('p-title').innerText = (data.emoji || "") + " " + data.name;
            document.getElementById('p-desc').innerText = data.desc || "상세 분류를 탐험해보세요.";
            document.getElementById('p-img').src = data.img || "https://via.placeholder.com/400x300/1e293b/ffffff?text=BioLogue";
            
            document.getElementById('p-tags').innerHTML = (data.features || []).map(f => `<span class="bg-blue-500/30 px-2 py-0.5 rounded-full text-[10px] text-blue-100 border border-blue-400/30">#${f}</span>`).join('');

            const btnArea = document.getElementById('p-btn-area');
            const btn = document.getElementById('p-btn');
            btnArea.classList.toggle('hidden', !data.id);
            btn.onclick = () => { closePopup(); renderTree(data.id); };

            popup.classList.add('popup-active');
        }

        window.closePopup = () => document.getElementById('info-popup').classList.remove('popup-active');
        
        // 휠 줌아웃 (위로 굴리면 상위 단계로)
        window.addEventListener('wheel', e => { 
            if(e.deltaY < -60 && currentLevel !== 'full') { 
                renderTree('full'); 
                closePopup(); 
            } 
        }, { passive: true });
    </script>
</body>
</html>
