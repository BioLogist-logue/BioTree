<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioLogue - 생명의 나무 (V17)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body, html { margin:0; padding:0; width:100%; height:100%; background-color:#020617; color:#ffffff; font-family:'Pretendard', sans-serif; overflow:hidden; touch-action: none; }
        #tree-canvas { width: 100vw; height: 100vh; }
        
        .link { fill: none; stroke: #475569; stroke-width: 2.5px; stroke-opacity: 0.4; transition: all 0.5s ease; }
        
        .node-label { 
            font-size: 14px; 
            font-weight: 900; 
            fill: #ffffff !important; 
            paint-order: stroke;
            stroke: #000000;
            stroke-width: 4px;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none; /* 클릭 이벤트 방해 금지 */
        }
        @media (max-width: 768px) { .node-label { font-size: 11px; } }

        .key-label { 
            font-size: 10px; 
            fill: #94a3b8 !important; 
            font-weight: 800; 
            font-style: italic;
            paint-order: stroke;
            stroke: #000000;
            stroke-width: 3px;
            pointer-events: none;
        }
        
        /* 노드 그룹 전체에 마우스 포인터 적용 */
        .node { cursor: pointer; }
        .node:hover circle { stroke: #3b82f6; stroke-width: 3px; filter: drop-shadow(0 0 8px #3b82f6); }
        .popup-active { transform: translateY(0) !important; opacity: 1 !important; }

        .social-btn { transition: all 0.3s; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .social-btn:hover { transform: translateX(8px); }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 right-0 p-4 bg-slate-950/80 backdrop-blur-md z-[100] border-b border-white/10 flex justify-between items-center">
        <h1 class="text-lg font-black flex items-center gap-2"><span class="text-blue-500 text-xl">🧬</span> BioLogue</h1>
        <div class="text-[9px] text-slate-500 font-bold tracking-widest uppercase text-right leading-tight">
            Phylogenetic Tree<br>by Yoon Ji Young
        </div>
    </header>

    <button id="global-back-btn" onclick="renderTree('full')" class="hidden fixed top-20 right-4 z-[150] bg-blue-600 hover:bg-blue-500 text-white font-black py-2 px-5 rounded-xl shadow-2xl transition-all border border-white/20 text-sm">
        ← 전체 계통수
    </button>

    <div class="fixed top-20 left-4 z-[150] flex flex-col gap-3">
        <a href="http://blog.naver.com/biologue_" target="_blank" class="social-btn flex items-center gap-2 bg-green-600 px-3 py-2 rounded-lg text-[11px] font-black border border-white/10">
            <span class="text-base">📝</span> BLOG
        </a>
        <a href="https://www.instagram.com/biologist_logue" target="_blank" class="social-btn flex items-center gap-2 bg-gradient-to-tr from-yellow-500 via-red-500 to-purple-600 px-3 py-2 rounded-lg text-[11px] font-black border border-white/10">
            <span class="text-base">📸</span> INSTA
        </a>
    </div>

    <div id="tree-canvas"></div>

    <div id="info-popup" class="fixed bottom-0 left-0 right-0 z-[200] bg-slate-900/95 border-t border-white/10 p-5 transform translate-y-full opacity-0 transition-all duration-500 backdrop-blur-2xl rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-start mb-4">
                <div class="flex gap-4 items-center">
                    <div class="w-24 h-20 md:w-40 md:h-28 bg-slate-800 rounded-xl overflow-hidden border border-white/10 shadow-lg shrink-0">
                        <img id="p-img" src="" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h2 id="p-title" class="text-xl md:text-2xl font-black text-white"></h2>
                        <div id="p-tags" class="flex flex-wrap gap-1 mt-1"></div>
                    </div>
                </div>
                <button onclick="closePopup()" class="text-slate-500 hover:text-white p-2 text-xl">✕</button>
            </div>
            <p id="p-desc" class="text-slate-300 text-sm mb-5 leading-relaxed"></p>
            <div id="p-btn-area" class="hidden">
                <button id="p-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all text-sm">
                    이 분류군 탐험하기 🔍
                </button>
            </div>
        </div>
    </div>

    <script>
        const treeData = {
            full: {
                name: "LIFE", color: "#64748b",
                children: [
                    { 
                        name: "진정세균역", emoji: "🦠", color: "#3b82f6", 
                        desc: "세포벽에 펩티도글리칸이 있는 원핵생물군입니다. 대장균, 남세균 등이 속합니다.",
                        img: "https://images.unsplash.com/photo-1583912267550-d44d7a125e7e?auto=format&fit=crop&q=80&w=400",
                        features: ["펩티도글리칸", "단세포"],
                        children: [{ 
                            name: "진정세균계", emoji: "🧪", color: "#3b82f6",
                            desc: "진정세균역에 속하는 계입니다. 원핵세포 구조를 가지며 전 세계에 분포합니다.",
                            img: "https://images.unsplash.com/photo-1583912267550-d44d7a125e7e?auto=format&fit=crop&q=80&w=400",
                            features: ["무핵", "펩티도글리칸O"]
                        }] 
                    },
                    { 
                        name: "Archaea/Eukarya", color: "#475569", 
                        children: [
                            { 
                                name: "고세균역", emoji: "🌋", color: "#a855f7",
                                desc: "극한 환경에 주로 서식하며, 진핵생물과 유사한 유전 체계를 가진 원핵생물입니다.",
                                img: "https://images.unsplash.com/photo-1533044309907-0fa3413da946?auto=format&fit=crop&q=80&w=400",
                                features: ["히스톤", "극한환경"],
                                children: [{ 
                                    name: "고세균계", emoji: "♨️", color: "#a855f7",
                                    desc: "고세균역에 속하는 계입니다. 메탄생성균, 고염분 선호균 등이 속합니다.",
                                    img: "https://images.unsplash.com/photo-1533044309907-0fa3413da946?auto=format&fit=crop&q=80&w=400",
                                    features: ["펩티도글리칸X", "메탄생성"]
                                }] 
                            },
                            { 
                                name: "진핵생물역", emoji: "🌿", color: "#10b981", 
                                desc: "핵막과 막성 세포 소기관을 가진 복잡한 구조의 세포 생물군입니다.",
                                img: "https://images.unsplash.com/photo-1470813740244-df37b8c1edcb?auto=format&fit=crop&q=80&w=400",
                                features: ["핵막O", "80S 리보솜"],
                                children: [
                                    { name: "원생생물계", emoji: "🧪", color: "#10b981", desc: "단세포 진핵생물 위주의 무리로 아메바, 짚신벌레 등이 속합니다.", features: ["단세포 중심"], img: "https://images.unsplash.com/photo-1530026405186-ed1f139313f8?auto=format&fit=crop&q=80&w=400" },
                                    { name: "식물계", id: "plantae", emoji: "🌳", color: "#22c55e", desc: "광합성을 하는 다세포 독립영양 생물군입니다.", features: ["셀룰로스"], img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=400" },
                                    { name: "균계", emoji: "🍄", color: "#10b981", desc: "유기물을 분해 흡수하는 종속영양 생물군입니다.", features: ["키틴"], img: "https://images.unsplash.com/photo-1504244412039-654e80556a3e?auto=format&fit=crop&q=80&w=400" },
                                    { name: "동물계", id: "animalia", emoji: "🦁", color: "#f59e0b", desc: "운동 능력이 있는 다세포 종속영양 생물군입니다.", features: ["세포벽X"], img: "https://images.unsplash.com/photo-1546182990-dffeafbe841d?auto=format&fit=crop&q=80&w=400" }
                                ]
                            }
                        ]
                    }
                ]
            },
            plantae: {
                name: "식물계", color: "#22c55e",
                children: [
                    { name: "선태식물", key: "관다발X", emoji: "🌱", desc: "관다발이 없어 물가에 서식하는 이끼류입니다.", features: ["이끼"], img: "https://images.unsplash.com/photo-1503719313506-775ca71339f4?auto=format&fit=crop&q=80&w=400" },
                    { name: "관다발 식물", children: [
                        { name: "양치식물", key: "종자X", emoji: "🌿", desc: "포자로 번식하는 고사리 등의 식물입니다.", features: ["고사리"], img: "https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?auto=format&fit=crop&q=80&w=400" },
                        { name: "종자 식물", children: [
                            { name: "나자식물", key: "씨방X", emoji: "🌲", desc: "밑씨가 노출된 소나무 등의 겉씨식물입니다.", img: "https://images.unsplash.com/photo-1544243685-645068228303?auto=format&fit=crop&q=80&w=400" },
                            { name: "속씨식물", key: "씨방O", emoji: "🌸", color: "#f472b6", desc: "씨방이 발달한 고등 꽃 식물입니다.", img: "https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81?auto=format&fit=crop&q=80&w=400" }
                        ]}
                    ]}
                ]
            },
            animalia: {
                name: "동물계", color: "#f59e0b",
                children: [
                    { name: "해면동물", key: "배엽X", emoji: "🧽", desc: "가장 원시적인 동물로 조직 분화가 뚜렷하지 않습니다.", img: "https://via.placeholder.com/400x300/f59e0b/ffffff?text=Sponge" },
                    { name: "진생동물", children: [
                        { name: "자포동물", key: "2배엽", emoji: "🪼", desc: "방사 대칭을 이루며 촉수를 가집니다.", img: "https://via.placeholder.com/400x300/f59e0b/ffffff?text=Jellyfish" },
                        { name: "3배엽 형성", children: [
                            { name: "선구동물", children: [{name:"연체/절지", key:"담륜자/탈피", emoji:"🦞", desc: "무척추동물 중심의 분류군"}]},
                            { name: "후구동물", children: [{name:"극피동물", emoji:"⭐"}, {name:"척삭동물", emoji:"🐟", desc: "척추동물을 포함하는 분류군"}]}
                        ]}
                    ]}
                ]
            }
        };

        let svg, g, zoomObj, currentLevel = 'full';

        window.onload = function() {
            svg = d3.select("#tree-canvas").append("svg").attr("width", "100%").attr("height", "100%");
            g = svg.append("g");
            zoomObj = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (e) => g.attr("transform", e.transform));
            svg.call(zoomObj);
            renderTree('full');
            window.addEventListener('resize', () => renderTree(currentLevel));
        };

        window.renderTree = function(level) {
            currentLevel = level;
            g.selectAll("*").remove();
            const data = treeData[level];
            const isMobile = window.innerWidth < 768;
            
            document.getElementById('global-back-btn').style.display = (level === 'full') ? 'none' : 'block';

            const root = d3.hierarchy(data);
            const treeLayout = d3.tree();
            
            if(isMobile) {
                treeLayout.nodeSize([110, 160]); 
            } else {
                treeLayout.size([window.innerHeight - 250, window.innerWidth - 450]);
            }
            treeLayout(root);

            const linkGen = isMobile ? d3.linkVertical().x(d => d.x).y(d => d.y) : d3.linkHorizontal().x(d => d.y).y(d => d.x);

            g.selectAll(".link").data(root.links()).enter().append("path")
                .attr("class", "link")
                .attr("d", linkGen);

            // 노드 그룹 생성 및 클릭 이벤트 통합 적용
            const node = g.selectAll(".node").data(root.descendants()).enter().append("g")
                .attr("class", "node")
                .attr("transform", d => isMobile ? `translate(${d.x},${d.y})` : `translate(${d.y},${d.x})`)
                .on("click", (e, d) => showPopup(d.data)); // 이제 글자든 원이든 그룹 전체 클릭 가능!

            // 터치 범위를 위한 투명 히트박스
            node.append("circle").attr("r", 45).attr("class", "node-hitbox");
            
            node.append("circle").attr("r", isMobile ? 7 : 9).style("fill", d => d.data.color || "#475569").style("stroke", "#fff");

            // 글자 위치 최적화
            node.append("text")
                .attr("class", "node-label")
                .attr("dy", (d) => {
                    if(!isMobile) return d.children ? "-2.0em" : "0.35em";
                    
                    if(d.children) return "-2.5em";
                    const siblingIdx = d.parent ? d.parent.children.indexOf(d) : 0;
                    return (siblingIdx % 2 === 0) ? "3.2em" : "3.5em"; 
                })
                .attr("x", d => isMobile ? 0 : (d.children ? 0 : 30)) // PC: 원에서 더 멀리 배치
                .style("text-anchor", d => isMobile ? "middle" : (d.children ? "middle" : "start"))
                .text(d => (d.data.emoji || "") + " " + d.data.name);

            node.filter(d => d.data.key).append("text")
                .attr("class", "key-label")
                .attr("dy", (d) => {
                    if(!isMobile) return "3.5em";
                    const siblingIdx = d.parent ? d.parent.children.indexOf(d) : 0;
                    return (siblingIdx % 2 !== 0) ? "6.8em" : "4.5em";
                })
                .attr("x", 0).style("text-anchor", "middle").text(d => d.data.key);

            const bounds = g.node().getBBox();
            const parent = svg.node().getBoundingClientRect();
            const scale = 0.75 / Math.max(bounds.width / parent.width, bounds.height / parent.height);
            const midX = bounds.x + bounds.width / 2, midY = bounds.y + bounds.height / 2;
            
            svg.transition().duration(700).call(
                zoomObj.transform, 
                d3.zoomIdentity.translate(parent.width/2 - scale*midX, parent.height/2 - scale*midY).scale(scale)
            );
        };

        function showPopup(data) {
            if(!data.desc && !data.id) return;
            const popup = document.getElementById('info-popup');
            document.getElementById('p-title').innerText = (data.emoji || "") + " " + data.name;
            document.getElementById('p-desc').innerText = data.desc || "상세 정보를 확인해보세요.";
            document.getElementById('p-img').src = data.img || "https://via.placeholder.com/400x300/1e293b/ffffff?text=BioLogue";
            
            document.getElementById('p-tags').innerHTML = (data.features || []).map(f => `<span class="bg-blue-500/30 px-2 py-0.5 rounded-full text-[10px] text-blue-100 border border-blue-400/30">#${f}</span>`).join('');

            const btnArea = document.getElementById('p-btn-area');
            const btn = document.getElementById('p-btn');
            btnArea.classList.toggle('hidden', !data.id);
            btn.onclick = (e) => { e.stopPropagation(); closePopup(); renderTree(data.id); };

            popup.classList.add('popup-active');
        }

        window.closePopup = () => document.getElementById('info-popup').classList.remove('popup-active');
        
        window.addEventListener('wheel', e => { 
            if(e.deltaY < -60 && currentLevel !== 'full') { 
                renderTree('full'); 
                closePopup(); 
            } 
        }, { passive: true });
    </script>
</body>
</html>
